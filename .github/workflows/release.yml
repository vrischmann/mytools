name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build zoekt-reindex
        run: cargo build --release --locked -p zoekt-reindex --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          archive="zoekt-reindex-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          mkdir -p dist

          cp "target/${{ matrix.target }}/release/zoekt-reindex" dist/
          cp README.md dist/
          tar -C dist -czf "$archive" .
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create/update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
