name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.package }} for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: zoekt-reindex
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - package: zoekt-reindex
            os: macos-latest
            target: aarch64-apple-darwin
          - package: ansible-password-agent
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - package: ansible-password-agent
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked -p ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          pkg="${{ matrix.package }}"
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          archive="${pkg}-${version}-${target}.tar.gz"
          mkdir -p dist

          cp "target/${target}/release/${pkg}" dist/

          # Include extra assets per package.
          case "$pkg" in
            ansible-password-agent)
              cp ansible-password-agent/assets/fish/vendor_conf.d/ansible-password-agent.fish dist/
              ;;
          esac

          tar -C dist -czf "$archive" .
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create/update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
